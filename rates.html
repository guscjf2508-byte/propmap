<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PropMap — 금리</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b3a6b;--navy2:#2a52a0;--gold:#c78a00;
  --red:#e03e3e;--green:#16a34a;
  --text:#1a2332;--muted:#6b7a99;--dim:#9aa5bc;
  --surface:#f4f7fb;--border:#dce4f0;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--navy);height:58px;display:flex;align-items:center;padding:0 24px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.back-btn{padding:6px 14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:none;}
.back-btn:hover{background:rgba(255,255,255,.22);}
.header-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.8);}
.edit-btn{margin-left:auto;padding:6px 16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:8px;color:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.edit-btn:hover{background:rgba(255,255,255,.22);}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:28px 24px;}

/* SECTION TITLE */
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.rate-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;box-shadow:0 2px 12px rgba(27,58,107,.06);}
.rate-card.highlight{border:2px solid var(--navy2);}
.rc-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.rc-val{font-size:36px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:8px;}
.rc-chg{font-size:13px;font-weight:600;}
.rc-up{color:var(--red);}
.rc-dn{color:var(--green);}
.rc-flat{color:var(--dim);}
.rc-date{font-size:11px;color:var(--dim);margin-top:8px;}

/* CHART */
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(27,58,107,.06);margin-bottom:24px;}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,20,40,.5);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:480px;box-shadow:0 24px 80px rgba(0,0,0,.2);}
.modal-title{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:20px;}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.modal-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.modal-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.modal-input:focus{border-color:var(--navy2);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn-primary{padding:10px 22px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;}
.btn-primary:hover{background:var(--navy2);}
.btn-ghost{padding:10px 18px;background:transparent;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;color:var(--muted);}

/* HISTORY TABLE */
.hist-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(27,58,107,.06);}
.hist-table{width:100%;border-collapse:collapse;font-size:13px;}
.hist-table th{background:var(--navy);color:#fff;padding:10px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.hist-table td{padding:10px 16px;border-bottom:1px solid var(--border);}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:var(--surface);}
.del-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:0;}
.del-btn:hover{color:var(--red);}
.empty-msg{text-align:center;padding:40px;color:var(--dim);font-size:13px;}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← PropMap</a>
  <div class="header-title">📊 금리 현황</div>
  <button class="edit-btn" onclick="openModal()">+ 금리 입력</button>
</header>

<main>
  <!-- 현재 금리 카드 -->
  <div class="section-title">현재 금리</div>
  <div class="card-grid">
    <div class="rate-card highlight">
      <div class="rc-label">기준금리</div>
      <div class="rc-val" id="v-base">—</div>
      <div class="rc-chg" id="c-base"></div>
      <div class="rc-date" id="d-base"></div>
    </div>
    <div class="rate-card">
      <div class="rc-label">국고채 3년</div>
      <div class="rc-val" id="v-tb3">—</div>
      <div class="rc-chg" id="c-tb3"></div>
      <div class="rc-date" id="d-tb3"></div>
    </div>
    <div class="rate-card">
      <div class="rc-label">국고채 10년</div>
      <div class="rc-val" id="v-tb10">—</div>
      <div class="rc-chg" id="c-tb10"></div>
      <div class="rc-date" id="d-tb10"></div>
    </div>
  </div>

  <!-- 차트 -->
  <div class="section-title">추이</div>
  <div class="chart-card">
    <div class="chart-title">기준금리 / 국고채 3년 / 국고채 10년</div>
    <canvas id="chart" height="100"></canvas>
  </div>

  <!-- 히스토리 -->
  <div class="section-title">입력 내역</div>
  <div class="hist-card">
    <table class="hist-table">
      <thead>
        <tr>
          <th>기준일</th>
          <th>기준금리</th>
          <th>국고채 3년</th>
          <th>국고채 10년</th>
          <th>메모</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="hist-body">
        <tr><td colspan="6" class="empty-msg">아직 입력된 데이터가 없습니다</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- 입력 모달 -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">금리 입력</div>
    <div class="modal-label">기준일</div>
    <input type="month" class="modal-input" id="inp-date" style="margin-bottom:14px">
    <div class="modal-row">
      <div>
        <div class="modal-label">기준금리 (%)</div>
        <input type="number" step="0.01" class="modal-input" id="inp-base" placeholder="예: 2.75">
      </div>
      <div>
        <div class="modal-label">국고채 3년 (%)</div>
        <input type="number" step="0.01" class="modal-input" id="inp-tb3" placeholder="예: 2.91">
      </div>
    </div>
    <div class="modal-row">
      <div>
        <div class="modal-label">국고채 10년 (%)</div>
        <input type="number" step="0.01" class="modal-input" id="inp-tb10" placeholder="예: 3.18">
      </div>
      <div>
        <div class="modal-label">메모 (선택)</div>
        <input type="text" class="modal-input" id="inp-memo" placeholder="예: 금통위 결정">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveRate()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyAI3xNDDELhlexXxyZZc8XmaiN4xh0CoyE",
  authDomain:"propmap-fe2.firebaseapp.com",
  projectId:"propmap-fe2",
});
const db = getFirestore(app);

let records = []; // [{date, base, tb3, tb10, memo}]
let chart = null;

// Firebase 저장/로드
async function loadFromFirebase(){
  const snap = await getDoc(doc(db,'market','rates'));
  if(snap.exists()) records = snap.data().records || [];
  else records = [];
}
async function saveToFirebase(){
  await setDoc(doc(db,'market','rates'), {records});
}

function render(){
  // 최신순 정렬
  records.sort((a,b)=>b.date.localeCompare(a.date));
  const latest = records[0];
  const prev   = records[1];

  function setCard(id, val, pval, date){
    const v = parseFloat(val), p = parseFloat(pval);
    document.getElementById(`v-${id}`).textContent = isNaN(v)?'—':v.toFixed(2)+'%';
    document.getElementById(`d-${id}`).textContent = date ? date.slice(0,4)+'.'+date.slice(5,7)+' 기준' : '';
    const el = document.getElementById(`c-${id}`);
    if(!isNaN(v)&&!isNaN(p)){
      const diff=(v-p).toFixed(2);
      if(diff>0){el.textContent=`▲ +${diff}%p`;el.className='rc-chg rc-up';}
      else if(diff<0){el.textContent=`▼ ${diff}%p`;el.className='rc-chg rc-dn';}
      else{el.textContent='─ 변동없음';el.className='rc-chg rc-flat';}
    } else { el.textContent=''; }
  }

  if(latest){
    setCard('base', latest.base, prev?.base, latest.date);
    setCard('tb3',  latest.tb3,  prev?.tb3,  latest.date);
    setCard('tb10', latest.tb10, prev?.tb10, latest.date);
  }

  // 히스토리 테이블
  const tbody = document.getElementById('hist-body');
  if(records.length===0){
    tbody.innerHTML='<tr><td colspan="6" class="empty-msg">아직 입력된 데이터가 없습니다</td></tr>';
  } else {
    tbody.innerHTML = records.map((r,i)=>`
      <tr>
        <td>${r.date.slice(0,4)}.${r.date.slice(5,7)}</td>
        <td>${r.base?r.base+'%':'—'}</td>
        <td>${r.tb3?r.tb3+'%':'—'}</td>
        <td>${r.tb10?r.tb10+'%':'—'}</td>
        <td style="color:var(--muted)">${r.memo||''}</td>
        <td><button class="del-btn" onclick="window.deleteRate(${i})">✕</button></td>
      </tr>`).join('');
  }

  // 차트 (오래된 순)
  const sorted = [...records].sort((a,b)=>a.date.localeCompare(b.date));
  const labels = sorted.map(r=>r.date.slice(0,4)+'.'+r.date.slice(5,7));
  const dBase  = sorted.map(r=>parseFloat(r.base)||null);
  const dTb3   = sorted.map(r=>parseFloat(r.tb3)||null);
  const dTb10  = sorted.map(r=>parseFloat(r.tb10)||null);

  if(chart) chart.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {label:'기준금리',data:dBase,borderColor:'#1b3a6b',backgroundColor:'rgba(27,58,107,.08)',borderWidth:2.5,pointRadius:4,tension:.1,stepped:true},
      {label:'국고채 3년',data:dTb3,borderColor:'#2a52a0',backgroundColor:'rgba(42,82,160,.06)',borderWidth:2,pointRadius:3,tension:.3},
      {label:'국고채 10년',data:dTb10,borderColor:'#c78a00',backgroundColor:'rgba(199,138,0,.06)',borderWidth:2,pointRadius:3,tension:.3},
    ]},
    options:{
      responsive:true,
      plugins:{
        legend:{position:'top',labels:{font:{size:11},boxWidth:12}},
        tooltip:{mode:'index',intersect:false,callbacks:{label:c=>c.parsed.y!=null?`${c.dataset.label}: ${c.parsed.y.toFixed(2)}%`:null}}
      },
      scales:{
        x:{ticks:{font:{size:11}},grid:{display:false}},
        y:{ticks:{font:{size:11},callback:v=>v.toFixed(2)+'%'},grid:{color:'rgba(0,0,0,.05)'}},
      },
    }
  });
}

window.openModal = function(){
  // 오늘 월 기본값
  const now = new Date();
  document.getElementById('inp-date').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('inp-base').value='';
  document.getElementById('inp-tb3').value='';
  document.getElementById('inp-tb10').value='';
  document.getElementById('inp-memo').value='';
  document.getElementById('modal-bg').classList.add('open');
}
window.closeModal = function(){
  document.getElementById('modal-bg').classList.remove('open');
}
window.saveRate = async function(){
  const date  = document.getElementById('inp-date').value;
  const base  = document.getElementById('inp-base').value;
  const tb3   = document.getElementById('inp-tb3').value;
  const tb10  = document.getElementById('inp-tb10').value;
  const memo  = document.getElementById('inp-memo').value.trim();
  if(!date){alert('기준일을 선택해주세요.');return;}
  if(!base&&!tb3&&!tb10){alert('금리를 하나 이상 입력해주세요.');return;}
  // 같은 월 있으면 업데이트
  const idx = records.findIndex(r=>r.date===date);
  if(idx>=0) records[idx]={date,base,tb3,tb10,memo};
  else records.push({date,base,tb3,tb10,memo});
  await saveToFirebase();
  render();
  closeModal();
}
window.deleteRate = async function(i){
  if(!confirm('이 항목을 삭제할까요?'))return;
  records.splice(i,1);
  await saveToFirebase();
  render();
}

// 초기 로드
loadFromFirebase().then(render);
</script>
</body>
</html>
