<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PropMap — 시장 금리</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b3a6b;--navy2:#2a52a0;--accent:#3b82f6;--gold:#c78a00;
  --red:#e03e3e;--green:#16a34a;
  --text:#1a2332;--muted:#6b7a99;--dim:#9aa5bc;
  --surface:#f4f7fb;--surface2:#eef2f8;--border:#dce4f0;
  --white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--navy);height:58px;display:flex;align-items:center;padding:0 24px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;text-decoration:none;}
.logo span{color:#7eb8f7;}
.back-btn{padding:6px 14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:none;transition:all .15s;}
.back-btn:hover{background:rgba(255,255,255,.22);}
.header-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.8);}
.update-time{margin-left:auto;font-size:11px;color:rgba(255,255,255,.5);id:update-time}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:28px 24px;}

/* SECTION TITLE */
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* CARD GRID */
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px;}

/* RATE CARD */
.rate-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(27,58,107,.06);transition:box-shadow .2s;}
.rate-card:hover{box-shadow:0 6px 24px rgba(27,58,107,.12);}
.rate-card.highlight{border-color:var(--navy2);border-width:2px;}
.rc-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.rc-val{font-size:32px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:8px;}
.rc-val.sm{font-size:24px;}
.rc-chg{font-size:13px;font-weight:600;}
.rc-up{color:var(--red);}
.rc-dn{color:var(--green);}
.rc-flat{color:var(--dim);}
.rc-date{font-size:10px;color:var(--dim);margin-top:6px;}

/* CHART CARD */
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(27,58,107,.06);margin-bottom:28px;}
.chart-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-msg{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:20px;text-align:center;color:#dc2626;font-size:13px;}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← PropMap</a>
  <div class="header-title">📊 시장 금리 현황</div>
  <div class="update-time" id="update-time"></div>
</header>

<main>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    금리 데이터를 불러오는 중...
  </div>
  <div id="content" style="display:none">
    <!-- 주요 금리 -->
    <div class="section-title">주요 정책 금리</div>
    <div class="card-grid-4">
      <div class="rate-card highlight" id="rc-base">
        <div class="rc-label">기준금리</div>
        <div class="rc-val" id="v-base">—</div>
        <div class="rc-chg" id="c-base">—</div>
        <div class="rc-date" id="d-base"></div>
      </div>
      <div class="rate-card" id="rc-tb3">
        <div class="rc-label">국고채 3년</div>
        <div class="rc-val" id="v-tb3">—</div>
        <div class="rc-chg" id="c-tb3">—</div>
        <div class="rc-date" id="d-tb3"></div>
      </div>
      <div class="rate-card" id="rc-tb5">
        <div class="rc-label">국고채 5년</div>
        <div class="rc-val" id="v-tb5">—</div>
        <div class="rc-chg" id="c-tb5">—</div>
        <div class="rc-date" id="d-tb5"></div>
      </div>
      <div class="rate-card" id="rc-tb10">
        <div class="rc-label">국고채 10년</div>
        <div class="rc-val" id="v-tb10">—</div>
        <div class="rc-chg" id="c-tb10">—</div>
        <div class="rc-date" id="d-tb10"></div>
      </div>
    </div>

    <!-- 단기/시장 금리 -->
    <div class="section-title">단기 / 시장 금리</div>
    <div class="card-grid-3">
      <div class="rate-card" id="rc-cd">
        <div class="rc-label">CD 91일</div>
        <div class="rc-val sm" id="v-cd">—</div>
        <div class="rc-chg" id="c-cd">—</div>
        <div class="rc-date" id="d-cd"></div>
      </div>
      <div class="rate-card" id="rc-aa">
        <div class="rc-label">회사채 AA-</div>
        <div class="rc-val sm" id="v-aa">—</div>
        <div class="rc-chg" id="c-aa">—</div>
        <div class="rc-date" id="d-aa"></div>
      </div>
      <div class="rate-card" id="rc-bbb">
        <div class="rc-label">회사채 BBB-</div>
        <div class="rc-val sm" id="v-bbb">—</div>
        <div class="rc-chg" id="c-bbb">—</div>
        <div class="rc-date" id="d-bbb"></div>
      </div>
    </div>

    <!-- 차트: 3년 추이 -->
    <div class="chart-card">
      <div class="chart-title">국고채 3년 / 10년 추이 — 최근 3년</div>
      <canvas id="chart-main" height="80"></canvas>
    </div>

    <!-- 차트: 기준금리 추이 -->
    <div class="chart-card">
      <div class="chart-title">기준금리 추이 — 최근 3년</div>
      <canvas id="chart-base" height="60"></canvas>
    </div>
  </div>
  <div id="error-area" style="display:none"></div>
</main>

<script>
const ECOS_KEY = 'WNKX92YP70C3H7HKTL6O';

// 날짜 계산
function getDateRange(years=3, monthly=false){
  const now = new Date();
  const ed_d = new Date(now);
  const sd_d = new Date(now);
  sd_d.setFullYear(sd_d.getFullYear() - years);

  if(monthly){
    const ed = `${ed_d.getFullYear()}${String(ed_d.getMonth()+1).padStart(2,'0')}`;
    const sd = `${sd_d.getFullYear()}${String(sd_d.getMonth()+1).padStart(2,'0')}`;
    return {sd, ed};
  } else {
    const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    return {sd: fmt(sd_d), ed: fmt(ed_d)};
  }
}

// JSONP 호출 (CORS 우회)
function fetchEcosJsonp(statCode, itemCode, freq, sd, ed, cnt=1000){
  return new Promise((resolve, reject) => {
    const cbName = 'ecosCb_' + Math.random().toString(36).slice(2);
    const url = `https://ecos.bok.or.kr/api/StatisticSearch/${ECOS_KEY}/jsonp/kr/1/${cnt}/${statCode}/${freq}/${sd}/${ed}/${itemCode}?callback=${cbName}`;
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      reject(new Error('timeout'));
    }, 10000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      resolve(data?.StatisticSearch?.row || []);
    };
    script.src = url;
    script.onerror = () => { clearTimeout(timer); reject(new Error('script error')); };
    document.head.appendChild(script);
  });
}

function fmtDate(timeStr, monthly=false){
  if(!timeStr) return '';
  if(monthly) return `${timeStr.slice(0,4)}.${timeStr.slice(4,6)}`;
  return `${timeStr.slice(0,4)}.${timeStr.slice(4,6)}.${timeStr.slice(6,8)}`;
}

function setCard(id, rows, monthly=false){
  const last = rows[rows.length-1];
  const prev = rows[rows.length-2];
  if(!last) return;
  const v = parseFloat(last.DATA_VALUE);
  const p = prev ? parseFloat(prev.DATA_VALUE) : NaN;
  document.getElementById(`v-${id}`).textContent = isNaN(v) ? '—' : v.toFixed(2)+'%';
  document.getElementById(`d-${id}`).textContent = fmtDate(last.TIME, monthly) + ' 기준';
  const chgEl = document.getElementById(`c-${id}`);
  if(!isNaN(v) && !isNaN(p)){
    const diff = (v-p).toFixed(2);
    if(diff>0){ chgEl.textContent=`▲ +${diff}`; chgEl.className='rc-chg rc-up'; }
    else if(diff<0){ chgEl.textContent=`▼ ${diff}`; chgEl.className='rc-chg rc-dn'; }
    else { chgEl.textContent='─ 변동없음'; chgEl.className='rc-chg rc-flat'; }
  } else {
    chgEl.textContent='—'; chgEl.className='rc-chg rc-flat';
  }
}

async function loadRates(){
  try{
    const {sd: sd_d, ed: ed_d} = getDateRange(3, false);
    const {sd: sd_m, ed: ed_m} = getDateRange(3, true);

    // 병렬 JSONP 요청
    const [base, tb3, tb5, tb10, cd, aa, bbb] = await Promise.all([
      fetchEcosJsonp('722Y001','0101000','M', sd_m, ed_m),
      fetchEcosJsonp('817Y002','010200000','D', sd_d, ed_d),
      fetchEcosJsonp('817Y002','010210000','D', sd_d, ed_d),
      fetchEcosJsonp('817Y002','010220000','D', sd_d, ed_d),
      fetchEcosJsonp('817Y002','010300000','D', sd_d, ed_d),
      fetchEcosJsonp('817Y002','010400000','D', sd_d, ed_d),
      fetchEcosJsonp('817Y002','010500000','D', sd_d, ed_d),
    ]);

    // 카드 업데이트
    setCard('base', base, true);
    setCard('tb3',  tb3);
    setCard('tb5',  tb5);
    setCard('tb10', tb10);
    setCard('cd',   cd);
    setCard('aa',   aa);
    setCard('bbb',  bbb);

    // 업데이트 시각
    document.getElementById('update-time').textContent =
      '업데이트: ' + new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});

    // 국고채 차트 (3년치 월간 샘플링 - 15일 간격)
    const sample = (arr, step=15) => arr.filter((_,i)=>i%step===0 || i===arr.length-1);
    const tb3s  = sample(tb3);
    const tb10s = sample(tb10);
    const labels = tb3s.map(r=>`${r.TIME.slice(4,6)}/${r.TIME.slice(6,8)}`);

    const ctx1 = document.getElementById('chart-main').getContext('2d');
    new Chart(ctx1,{
      type:'line',
      data:{
        labels,
        datasets:[
          {label:'국고채 3년',data:tb3s.map(r=>parseFloat(r.DATA_VALUE)),
           borderColor:'#2a52a0',backgroundColor:'rgba(42,82,160,.08)',borderWidth:2,pointRadius:0,tension:.3},
          {label:'국고채 10년',data:tb10s.map(r=>parseFloat(r.DATA_VALUE)),
           borderColor:'#c78a00',backgroundColor:'rgba(199,138,0,.08)',borderWidth:2,pointRadius:0,tension:.3},
        ]
      },
      options:{
        responsive:true,
        plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12}},
          tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(2)}%`}}},
        scales:{
          x:{ticks:{maxTicksLimit:18,font:{size:10}},grid:{display:false}},
          y:{ticks:{font:{size:10},callback:v=>v.toFixed(2)+'%'},grid:{color:'rgba(0,0,0,.05)'}},
        },
      }
    });

    // 기준금리 차트
    const ctx2 = document.getElementById('chart-base').getContext('2d');
    new Chart(ctx2,{
      type:'line',
      data:{
        labels: base.map(r=>`${r.TIME.slice(0,4)}.${r.TIME.slice(4,6)}`),
        datasets:[{
          label:'기준금리',
          data:base.map(r=>parseFloat(r.DATA_VALUE)),
          borderColor:'#1b3a6b',backgroundColor:'rgba(27,58,107,.08)',
          borderWidth:2,pointRadius:3,pointBackgroundColor:'#1b3a6b',tension:.1,stepped:true
        }]
      },
      options:{
        responsive:true,
        plugins:{legend:{display:false},
          tooltip:{callbacks:{label:c=>`기준금리: ${c.parsed.y.toFixed(2)}%`}}},
        scales:{
          x:{ticks:{maxTicksLimit:12,font:{size:10}},grid:{display:false}},
          y:{ticks:{font:{size:10},callback:v=>v.toFixed(2)+'%'},grid:{color:'rgba(0,0,0,.05)'}},
        },
      }
    });

    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';

  }catch(e){
    console.error(e);
    document.getElementById('loading').style.display='none';
    document.getElementById('error-area').style.display='block';
    document.getElementById('error-area').innerHTML=`
      <div class="error-msg">
        금리 데이터를 불러오는 데 실패했습니다.<br>
        <small style="color:#9ca3af;margin-top:4px;display:block">${e.message}</small>
      </div>`;
  }
}

loadRates();
</script>
</body>
</html>
