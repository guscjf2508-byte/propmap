<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PropMap — 시장 금리</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b3a6b;--navy2:#2a52a0;--gold:#c78a00;
  --red:#e03e3e;--green:#16a34a;
  --text:#1a2332;--muted:#6b7a99;--dim:#9aa5bc;
  --surface:#f4f7fb;--border:#dce4f0;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;}
header{background:var(--navy);height:58px;display:flex;align-items:center;padding:0 24px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;}
.logo span{color:#7eb8f7;}
.back-btn{padding:6px 14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:none;transition:all .15s;}
.back-btn:hover{background:rgba(255,255,255,.22);}
.header-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.8);}
.update-time{margin-left:auto;font-size:11px;color:rgba(255,255,255,.5);}
main{max-width:1200px;margin:0 auto;padding:28px 24px;}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px;}
.rate-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(27,58,107,.06);transition:box-shadow .2s;}
.rate-card:hover{box-shadow:0 6px 24px rgba(27,58,107,.12);}
.rate-card.highlight{border:2px solid var(--navy2);}
.rc-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.rc-val{font-size:32px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:8px;}
.rc-val.sm{font-size:24px;}
.rc-chg{font-size:12px;font-weight:600;}
.rc-up{color:var(--red);}
.rc-dn{color:var(--green);}
.rc-flat{color:var(--dim);}
.rc-date{font-size:10px;color:var(--dim);margin-top:6px;}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(27,58,107,.06);margin-bottom:24px;}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}
.loading{text-align:center;padding:80px;color:var(--muted);font-size:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:24px;text-align:center;color:#dc2626;font-size:13px;margin-top:20px;}
@media(max-width:768px){
  .card-grid-4{grid-template-columns:repeat(2,1fr);}
  .card-grid-3{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← PropMap</a>
  <div class="header-title">📊 시장 금리 현황</div>
  <div class="update-time" id="update-time"></div>
</header>

<main>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    금리 데이터를 불러오는 중...
  </div>

  <div id="content" style="display:none">
    <div class="section-title">주요 금리</div>
    <div class="card-grid-4">
      <div class="rate-card highlight"><div class="rc-label">기준금리</div><div class="rc-val" id="v-base">—</div><div class="rc-chg" id="c-base">—</div><div class="rc-date" id="d-base"></div></div>
      <div class="rate-card"><div class="rc-label">국고채 3년</div><div class="rc-val" id="v-tb3">—</div><div class="rc-chg" id="c-tb3">—</div><div class="rc-date" id="d-tb3"></div></div>
      <div class="rate-card"><div class="rc-label">국고채 5년</div><div class="rc-val" id="v-tb5">—</div><div class="rc-chg" id="c-tb5">—</div><div class="rc-date" id="d-tb5"></div></div>
      <div class="rate-card"><div class="rc-label">국고채 10년</div><div class="rc-val" id="v-tb10">—</div><div class="rc-chg" id="c-tb10">—</div><div class="rc-date" id="d-tb10"></div></div>
    </div>

    <div class="section-title">단기 / 시장 금리</div>
    <div class="card-grid-3">
      <div class="rate-card"><div class="rc-label">CD 91일</div><div class="rc-val sm" id="v-cd">—</div><div class="rc-chg" id="c-cd">—</div><div class="rc-date" id="d-cd"></div></div>
      <div class="rate-card"><div class="rc-label">회사채 AA-</div><div class="rc-val sm" id="v-aa">—</div><div class="rc-chg" id="c-aa">—</div><div class="rc-date" id="d-aa"></div></div>
      <div class="rate-card"><div class="rc-label">회사채 BBB-</div><div class="rc-val sm" id="v-bbb">—</div><div class="rc-chg" id="c-bbb">—</div><div class="rc-date" id="d-bbb"></div></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">국고채 3년 / 10년 추이 — 최근 3년</div>
      <canvas id="chart-main" height="80"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">기준금리 추이 — 최근 3년</div>
      <canvas id="chart-base" height="60"></canvas>
    </div>
  </div>

  <div id="error-area"></div>
</main>

<script>
const ECOS_KEY = 'WNKX92YP70C3H7HKTL6O';
const PROXY = 'https://api.allorigins.win/get?url=';

function getRange(years, monthly){
  const now = new Date();
  const ed_d = new Date(now);
  const sd_d = new Date(now);
  sd_d.setFullYear(sd_d.getFullYear() - years);
  if(monthly){
    const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`;
    return {sd:fmt(sd_d), ed:fmt(ed_d)};
  }
  const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  return {sd:fmt(sd_d), ed:fmt(ed_d)};
}

async function fetchEcos(statCode, itemCode, freq, years){
  const monthly = freq==='M';
  const {sd,ed} = getRange(years, monthly);
  const cnt = monthly ? 40 : 800;
  const apiUrl = `https://ecos.bok.or.kr/api/StatisticSearch/${ECOS_KEY}/json/kr/1/${cnt}/${statCode}/${freq}/${sd}/${ed}/${itemCode}`;
  const res = await fetch(PROXY + encodeURIComponent(apiUrl));
  const outer = await res.json();
  const data = JSON.parse(outer.contents);
  return data?.StatisticSearch?.row || [];
}

function fmtTime(t, monthly){
  if(!t) return '';
  if(monthly) return `${t.slice(0,4)}.${t.slice(4,6)}`;
  return `${t.slice(0,4)}.${t.slice(4,6)}.${t.slice(6,8)}`;
}

function setCard(id, rows, monthly=false){
  const last = rows[rows.length-1];
  const prev = rows[rows.length-2];
  if(!last) return;
  const v = parseFloat(last.DATA_VALUE);
  const p = prev ? parseFloat(prev.DATA_VALUE) : NaN;
  document.getElementById(`v-${id}`).textContent = isNaN(v)?'—':v.toFixed(2)+'%';
  document.getElementById(`d-${id}`).textContent = fmtTime(last.TIME, monthly)+' 기준';
  const el = document.getElementById(`c-${id}`);
  if(!isNaN(v)&&!isNaN(p)){
    const diff = (v-p).toFixed(2);
    if(diff>0){el.textContent=`▲ +${diff}`;el.className='rc-chg rc-up';}
    else if(diff<0){el.textContent=`▼ ${diff}`;el.className='rc-chg rc-dn';}
    else{el.textContent='─ 변동없음';el.className='rc-chg rc-flat';}
  } else {el.textContent='—';el.className='rc-chg rc-flat';}
}

function drawChart(canvasId, datasets, labels, stepped=false){
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx,{
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true,
      plugins:{
        legend:{position:'top',labels:{font:{size:11},boxWidth:12}},
        tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(2)}%`}}
      },
      scales:{
        x:{ticks:{maxTicksLimit:18,font:{size:10}},grid:{display:false}},
        y:{ticks:{font:{size:10},callback:v=>v.toFixed(2)+'%'},grid:{color:'rgba(0,0,0,.05)'}},
      },
    }
  });
}

async function loadRates(){
  try{
    // 카드용 최신 3개 + 차트용 3년치 병렬 조회
    const [base, tb3, tb5, tb10, cd, aa, bbb, cBase, cTb3, cTb10] = await Promise.all([
      fetchEcos('722Y001','0101000','M',3),
      fetchEcos('817Y002','010200000','D',3),
      fetchEcos('817Y002','010210000','D',3),
      fetchEcos('817Y002','010220000','D',3),
      fetchEcos('817Y002','010300000','D',3),
      fetchEcos('817Y002','010400000','D',3),
      fetchEcos('817Y002','010500000','D',3),
      fetchEcos('722Y001','0101000','M',3),     // 기준금리 차트
      fetchEcos('817Y002','010200000','D',3),   // 국고채3년 차트
      fetchEcos('817Y002','010220000','D',3),   // 국고채10년 차트
    ]);

    setCard('base', base, true);
    setCard('tb3',  tb3);
    setCard('tb5',  tb5);
    setCard('tb10', tb10);
    setCard('cd',   cd);
    setCard('aa',   aa);
    setCard('bbb',  bbb);

    document.getElementById('update-time').textContent =
      '업데이트: '+new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});

    // 국고채 차트 — 15일 간격 샘플링
    const step = Math.max(1, Math.floor(cTb3.length/80));
    const sample = arr => arr.filter((_,i)=>i%step===0||i===arr.length-1);
    const s3=sample(cTb3), s10=sample(cTb10);
    const labelsD = s3.map(r=>`${r.TIME.slice(4,6)}/${r.TIME.slice(6,8)}`);
    drawChart('chart-main',[
      {label:'국고채 3년', data:s3.map(r=>parseFloat(r.DATA_VALUE)),
       borderColor:'#2a52a0',backgroundColor:'rgba(42,82,160,.08)',borderWidth:2,pointRadius:0,tension:.3},
      {label:'국고채 10년',data:s10.map(r=>parseFloat(r.DATA_VALUE)),
       borderColor:'#c78a00',backgroundColor:'rgba(199,138,0,.08)',borderWidth:2,pointRadius:0,tension:.3},
    ], labelsD);

    // 기준금리 차트
    const labelsM = cBase.map(r=>`${r.TIME.slice(0,4)}.${r.TIME.slice(4,6)}`);
    drawChart('chart-base',[
      {label:'기준금리', data:cBase.map(r=>parseFloat(r.DATA_VALUE)),
       borderColor:'#1b3a6b',backgroundColor:'rgba(27,58,107,.1)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#1b3a6b',tension:.1,stepped:true},
    ], labelsM);

    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';

  }catch(e){
    console.error(e);
    document.getElementById('loading').style.display='none';
    document.getElementById('error-area').innerHTML=
      `<div class="error-box">금리 데이터를 불러오는 데 실패했습니다.<br><small style="color:#9ca3af;margin-top:4px;display:block">${e.message}</small></div>`;
  }
}

loadRates();
</script>
</body>
</html>
